<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>BoltDrop</title>

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Google Fonts — тема Cyberpunk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="game-container"></div>
  <div id="ui-overlay">
    <div id="hud-top">
      <div id="hud-lives">
        <span class="hud-label">ЖИЗНИ</span>
        <div id="lives-icons"></div>
      </div>
      <div id="hud-level">
        <span class="hud-label">УРОВЕНЬ</span>
        <span id="level-num">1</span>
      </div>
      <div id="hud-hints">
        <span class="hud-label">ПОДСКАЗКИ</span>
        <span id="hints-num">0</span>
      </div>
    </div>

    <!-- Кнопки действий -->
    <div id="action-bar">
      <button id="btn-hint" class="action-btn" title="Подсказка">💡</button>
      <button id="btn-shop" class="action-btn primary-btn" title="Магазин">⭐</button>
      <button id="btn-menu" class="action-btn" title="Меню">☰</button>
    </div>
  </div>

  <!-- Модалка магазина -->
  <div id="shop-modal" class="modal hidden">
    <div class="modal-box">
      <h2 class="modal-title">⭐ МАГАЗИН</h2>
      <div id="shop-items"></div>
      <button id="btn-close-shop" class="modal-close">✕</button>
    </div>
  </div>

  <!-- Toast уведомления -->
  <div id="toast-container"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
